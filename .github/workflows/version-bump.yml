name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New CFBundleShortVersionString (semver, e.g. 0.2.0)"
        type: string
        required: true
      build_number:
        description: "Optional CFBundleVersion override (numeric). If empty, current build + 1"
        type: string
        required: false
        default: ""
      base_branch:
        description: "Target branch for the version bump"
        type: string
        required: false
        default: "main"
      create_pull_request:
        description: "Create a PR instead of pushing directly"
        type: boolean
        required: false
        default: true
      create_tag:
        description: "Create and push tag v<version> (only when create_pull_request=false)"
        type: boolean
        required: false
        default: false

jobs:
  bump-version:
    name: Bump version in Info.plist
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0

      - name: Validate workflow input combination
        run: |
          if [[ "${{ inputs.create_pull_request }}" == "true" && "${{ inputs.create_tag }}" == "true" ]]; then
            echo "create_tag=true is only supported when create_pull_request=false"
            exit 1
          fi

      - name: Validate version/build input
        run: |
          VERSION="${{ inputs.version }}"
          BUILD_NUMBER="${{ inputs.build_number }}"

          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '${VERSION}'. Expected x.y.z format."
            exit 1
          fi

          if [[ -n "${BUILD_NUMBER}" ]] && ! [[ "${BUILD_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "Invalid build_number '${BUILD_NUMBER}'. Expected numeric value."
            exit 1
          fi

      - name: Bump Resources/Info.plist
        id: bump
        run: |
          PLIST_PATH="Resources/Info.plist"
          VERSION="${{ inputs.version }}"
          BUILD_NUMBER_INPUT="${{ inputs.build_number }}"

          CURRENT_SHORT_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "${PLIST_PATH}")"
          CURRENT_BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "${PLIST_PATH}")"

          if [[ -n "${BUILD_NUMBER_INPUT}" ]]; then
            NEXT_BUILD_VERSION="${BUILD_NUMBER_INPUT}"
          else
            if ! [[ "${CURRENT_BUILD_VERSION}" =~ ^[0-9]+$ ]]; then
              echo "Current CFBundleVersion is not numeric: ${CURRENT_BUILD_VERSION}"
              exit 1
            fi
            NEXT_BUILD_VERSION="$((CURRENT_BUILD_VERSION + 1))"
          fi

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "${PLIST_PATH}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${NEXT_BUILD_VERSION}" "${PLIST_PATH}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${NEXT_BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "old_version=${CURRENT_SHORT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "old_build=${CURRENT_BUILD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Show changed files
        run: |
          git diff -- Resources/Info.plist

      - name: Run quick preflight (metadata only)
        run: |
          SKIP_BUILD=1 scripts/release-preflight.sh

      - name: Create pull request
        id: cpr
        if: ${{ inputs.create_pull_request }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/release-v${{ steps.bump.outputs.version }}-b${{ steps.bump.outputs.build }}
          base: ${{ inputs.base_branch }}
          title: "chore(release): bump version to v${{ steps.bump.outputs.version }}"
          commit-message: "chore(release): bump version to v${{ steps.bump.outputs.version }} (build ${{ steps.bump.outputs.build }})"
          body: |
            ## Release version bump

            - **Version**: `${{ steps.bump.outputs.old_version }}` → `${{ steps.bump.outputs.version }}`
            - **Build**: `${{ steps.bump.outputs.old_build }}` → `${{ steps.bump.outputs.build }}`

            Generated by the `Version Bump` workflow.
          add-paths: |
            Resources/Info.plist
          delete-branch: true

      - name: Commit and push directly
        if: ${{ !inputs.create_pull_request }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Resources/Info.plist

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(release): bump version to v${{ steps.bump.outputs.version }} (build ${{ steps.bump.outputs.build }})"
          git push origin "HEAD:${{ inputs.base_branch }}"

      - name: Create and push release tag
        if: ${{ inputs.create_tag && !inputs.create_pull_request }}
        run: |
          TAG_NAME="v${{ steps.bump.outputs.version }}"

          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag already exists: ${TAG_NAME}"
            exit 1
          fi

          git tag -a "${TAG_NAME}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Summary
        run: |
          {
            echo "## Version bump completed"
            echo ""
            echo "- Version: ${{ steps.bump.outputs.old_version }} -> ${{ steps.bump.outputs.version }}"
            echo "- Build: ${{ steps.bump.outputs.old_build }} -> ${{ steps.bump.outputs.build }}"

            if [[ "${{ inputs.create_pull_request }}" == "true" ]]; then
              PR_URL="${{ steps.cpr.outputs['pull-request-url'] }}"
              if [[ -n "${PR_URL}" ]]; then
                echo "- Pull request: ${PR_URL}"
              else
                echo "- Pull request: created/updated (see workflow logs)"
              fi
            else
              echo "- Commit was pushed directly to: ${{ inputs.base_branch }}"
            fi

            if [[ "${{ inputs.create_tag }}" == "true" && "${{ inputs.create_pull_request }}" == "false" ]]; then
              echo "- Tag created: v${{ steps.bump.outputs.version }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
